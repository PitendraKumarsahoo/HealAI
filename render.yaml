services:
  - type: web
    name: healai-backend
    env: python
    rootDir: backend
    plan: free
    region: ohio
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: FLASK_DEBUG
        value: "0"
      - key: DB_PATH
        value: healai.db
